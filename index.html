<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEAD PING — El ruido te delata</title>
  <meta name="description" content="Duelo submarino de deducción táctica. Dos submarinos, una fosa negra, un disparo correcto. Jugá online con un amigo, sin cuentas." />
  <meta name="theme-color" content="#01050b" />
  <meta property="og:title" content="DEAD PING — El ruido te delata" />
  <meta property="og:description" content="Dos submarinos. Una fosa negra. Un disparo correcto. Duelo táctico online, gratis y sin cuentas." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://edusierragit.github.io/dead-ping/" />
  <meta property="og:image" content="https://edusierragit.github.io/dead-ping/deadpingban.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://edusierragit.github.io/dead-ping/deadpingban.png" />
  <link rel="apple-touch-icon" href="./deadping.png" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23030607'/%3E%3Ccircle cx='16' cy='16' r='10' fill='none' stroke='%236effb0' stroke-width='2' opacity='0.5'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%236effb0'/%3E%3C/svg%3E" />
</head>
<body>
  <div id="app">
    <div id="scopeWrap">
      <canvas id="scope"></canvas>
      <div class="crt"></div>
      <div id="tremorVignette"></div>
    </div>
    <aside id="panel">
      <header class="brand">
        <h1>DEAD PING</h1>
        <div class="sub">PROTOCOLO CAZADOR // DUELO EN LA FOSA</div>
      </header>
      <section class="bars">
        <div class="bar"><label class="lblMe">▲ VOS</label><div id="hullPlayer" class="pips"></div></div>
        <div class="bar"><label class="lblFoe">▲ ENEMIGO</label><div id="hullEnemy" class="pips enemy"></div></div>
        <div class="bar" title="Cuánto te oyeron últimamente. Baja sola turno a turno: el silencio te borra del mapa.">
          <label class="lblNoise">◍ RUIDO</label><div id="noiseBar" class="pips noise"></div>
        </div>
      </section>
      <section class="status">
        <span id="turnLabel">T-01</span>
        <span id="modeLabel"></span>
        <span id="pressureLabel"></span>
      </section>
      <div id="turnState" class="ts-none"></div>
      <section id="actions"></section>
      <div id="hint"></div>
      <div id="log"></div>
      <div id="legend"><span class="l">●</span> ruido oído &nbsp; <span class="q">▲</span> vos &nbsp; <span class="r">◆</span> visto/peligro &nbsp; <span class="l">◍</span> vent (ruido propio)</div>
    </aside>
  </div>
  <div id="overlay" class="hidden"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
