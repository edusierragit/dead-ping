<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEAD PING</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23030607'/%3E%3Ccircle cx='16' cy='16' r='10' fill='none' stroke='%236effb0' stroke-width='2' opacity='0.5'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%236effb0'/%3E%3C/svg%3E" />
</head>
<body>
  <div id="app">
    <div id="scopeWrap">
      <canvas id="scope"></canvas>
      <div class="crt"></div>
      <div id="tremorVignette"></div>
    </div>
    <aside id="panel">
      <header class="brand">
        <h1>DEAD PING</h1>
        <div class="sub">PROTOCOLO CAZADOR // DUELO EN LA FOSA</div>
      </header>
      <section class="bars">
        <div class="bar"><label>CASCO</label><div id="hullPlayer" class="pips"></div></div>
        <div class="bar"><label>CONTACTO</label><div id="hullEnemy" class="pips enemy"></div></div>
      </section>
      <section class="status">
        <span id="turnLabel">T-01</span>
        <span id="tubeLabel" class="ok">TUBO LISTO</span>
        <span id="decoyLabel">SEÑUELOS ◆◆</span>
        <span id="pressureLabel"></span>
      </section>
      <section id="actions"></section>
      <div id="hint"></div>
      <div id="log"></div>
    </aside>
  </div>
  <div id="overlay" class="hidden"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
